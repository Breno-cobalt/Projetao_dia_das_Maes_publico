<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Dia das Mães</title>

<style>
    

@font-face {
    font-family: 'QuickLove';
    src: url('Quick Love.ttf') format('truetype');
}

@font-face {
    font-family: 'QuickLoveItalic';
    src: url('Quick Love Italic.ttf') format('truetype');
}

@font-face {
    font-family: 'AgniaMisel';
    src: url('Agnia Misel.otf') format('Opentype');
}


body {
    
    margin: 0;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: lightgoldenrodyellow;
    font-family: 'QuickLove', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}
 


.container {
    max-width: 800px;
    padding: 20px;
}

#conteudo {
    transition: opacity 0.5s;
}

.nome {
    font-size: 35px;
    opacity: 0.7;
    margin-bottom: 10px;
    font-family: 'QuickLove', cursive;
}

.frase {
    font-size: 60px;
}

.inicio {
    font-size: 65px;
}

.saindo {
    animation: sair 0.4s forwards;
}

.entrando {
    animation: entrar 0.4s forwards;
}

@keyframes sair {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(30px); }
}

@keyframes entrar {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
}

.emojis {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;   
    height: 100vh;  
    pointer-events: none;
    overflow: hidden;
    opacity: 0.7;
}

.emoji {
    position: absolute;
    opacity: 0.5;
    animation: flutuar linear forwards;
}

@keyframes flutuar {
    0% {
        transform: translateY(100vh) translateX(0px) rotate(0deg);
        opacity: 0;
    }
    20% {
        opacity: 0.6;
    }
    100% {
        transform: translateY(-10vh) translateX(var(--x-move)) rotate(360deg);
        opacity: 0;
    }
}

</style>
</head>



<body>

<div id="contador"></div>
<div class="emojis"></div>

<div class="container">
    <div id="conteudo"></div>
</div>

<script>

const telas = [
    { tipo: "inicio", texto: "Mãe, para mim significa..." },

    { nome: "Breno", frase:"Amor que nunca acaba."},
    { nome: "Gabriel Batochi", frase:"Cuidado."},
    { nome: "João", frase:"Amor, cuidado e familia."},
    { nome: "Maria eduarda Lopes", frase:"Proteção."},
    { nome: "Isabella Barnabé", frase:"Porto Seguro, estabilidade."},
    { nome: "Emily", frase:"Confiança."},
    { nome: "Lara", frase:"Amor."},
    { nome: "Aldair", frase:"Tudo, a base."},
    { nome: "Cleidinalva", frase:"Cuidado, apoio, 'doutora', beijinho para sarar."},
    { nome: "Alessandro", frase:"Amor e cuidado."},
    { nome: "Gabriel resenhudo dos Santos", frase:"Protetora."},
    { nome: "Arthur", frase:"Tudo, aquela que me sustenta."},
    { nome: "Lucas Mesquita da Costa", frase:"Força."},
    { nome: "jonathan", frase:"que minha mãe é protetora."},
    { nome: "Davi", frase:"Vida."},
    { nome: "Samuel", frase:"Referência."},
    { nome: "Gabriel Vieira", frase:"Tudo, rainha, Criadora, esperança... tudo."},
    { nome: "Gabriel Sodré", frase:"Segurança e Amizade."},
    { nome: "André", frase:"Reciprocidade."},
    { nome: "Renam", frase:"Amor, cuidado e carinho."},
    { nome: "Leonardo Aguiar", frase:"Pilar da vida, amor, Melhor Pessoa, Parceira."},
    { nome: "Miguel", frase:"Muralha muito forte, escudo."},
    { nome: "Frasato", frase:"Sinal de vida, de amor... Ele está lá por você."},
    { nome: "Lucas Mendes", frase:"Vida, me ilumina, razão do meu viver."},
    { nome: "Gustavo", frase:"A raiz de tudo."},
    { nome: "Enzo (Jordan)", frase:"Não há palavras para descrever..."},
    { nome: "Giovana", frase:"proteção e cuidado."},
    { nome: "Kaleo", frase:"Proteção, amor, carinho, segurança, responsabilidade..."},
    { nome: "Diana", frase:"Mãe é como se fosse Deus..."},
];

let index = 0;

function mostrarTelaAnimado() {
    const conteudo = document.getElementById("conteudo");

    conteudo.classList.add("saindo");

    setTimeout(() => {
        if (telas[index].tipo === "inicio") {
            conteudo.innerHTML = `<div class="inicio entrando">${telas[index].texto}</div>`;
        } else {
            conteudo.innerHTML = `
                <div class="nome entrando">${telas[index].nome}</div>
                <div class="frase entrando">${telas[index].frase}</div>
            `;
        }
        conteudo.classList.remove("saindo");
    }, 400);

    const contador = document.getElementById("contador");
    let total = telas.length - 1;
    

    if (index === 0) {
        contador.innerText = "";
    } else {
        contador.innerText = index + " - " + total;
    }
    
}

mostrarTelaAnimado();

document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        index++;
        if (index >= telas.length) index = 0;
        mostrarTelaAnimado();
    }
});

const emojisLista = ["💖", "🍼", "💗", "🌸", "💕"];

function criarEmoji() {
    const emoji = document.createElement("div");
    emoji.className = "emoji";

    emoji.innerText = emojisLista[Math.floor(Math.random() * emojisLista.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.setProperty("--x-move", (Math.random() * 300 - 150) + "px");
    emoji.style.fontSize = (18 + Math.random() * 20) + "px";
    emoji.style.animationDuration = (8 + Math.random() * 6) + "s";

    document.querySelector(".emojis").appendChild(emoji);

    setTimeout(() => {
        emoji.remove();
    }, 14000);
}
for (let i = 0; i < 20; i++) {
    setTimeout(criarEmoji, i * 150);
}

setInterval(criarEmoji, 600);

</script>


</body>
</html>
